<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="description"
	content="Manage your LawSetu account profile, personal information and legal activity easily.">
<meta name="keywords"
	content="user profile, client account, legal platform profile, Lawसेतु">

<link rel="icon" type="image/x-icon" th:href="@{/img/lawSetuLogo.png}">
<title>User Profile – LawSetu</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/UserProfileStyle.css}">
</head>

<body class="light">
	<div class="container-fluid">
		<div class="row">

			<!-- ================= SIDEBAR ================= -->
			<!-- ================= SIDEBAR ================= -->
			<div class="col-lg-2 sidebar p-3 text-center" id="sidebar">


				<!-- 🔥 USER PROFILE IMAGE -->
				<img src="https://i.pravatar.cc/100?img=12"
					class="rounded-circle mb-2"
					style="width: 90px; height: 90px; object-fit: cover; border: 3px solid white;">

				<!-- 🔥 USER NAME -->
				<p class="fw-bold mb-3 " id="client-name1">XXXXXX</p>

				<!-- 🔥 SOCIAL PROFILE BUTTON (School ke upar) -->
				<a href="client-dashboard" class="btn btn-warning w-100 mb-3">
					Dashboard </a>


				<!-- 🔥 SCHOOL BUTTON -->
				<button class="btn btn-light w-100 mb-2" onclick="toggleMenu()">
					📚 Legal Services</button>

				<!-- 🔽 SCHOOL MENU -->
				<div id="menu" class="d-none">

					<button
						onclick="window.location.href='/lawsetu/client-casedetails'"
						class="btn btn-outline-light w-100 mb-2">Legal Records</button>

					<button class="btn btn-outline-light w-100 mb-2"
						onclick="toggleLawyerMenu()">Lawyer Finder</button>

					<!-- SUBMENU -->
					<div id="lawyerMenu" class="d-none">

						<button onclick="window.location.href='/lawsetu/civil-lawyer'"
							class="btn btn-sm btn-outline-warning w-100 mb-2">Civil
							Case</button>

						<button onclick="window.location.href='/lawsetu/civil-lawyer'"
							class="btn btn-sm btn-outline-warning w-100 mb-2">
							Family Case</button>

						<button onclick="window.location.href='/lawsetu/civil-lawyer'"
							class="btn btn-sm btn-outline-warning w-100 mb-2">
							Criminal Case</button>

					</div>

				</div>
				
				<button class="btn btn-light w-100 mb-2" data-bs-toggle="modal"
					data-bs-target="#queryModal">Submit Query ?</button>
				
				<button class="btn btn-light w-100 mb-2" onclick="window.location.href='/lawsetu/about-lawsetu'" >About us</button>
				
					
				<button class="btn btn-light w-100 mb-2" onclick="window.location.href='/lawsetu'">Logout</button>
				
			</div>

			<!-- ================= MAIN ================= -->
			<div class="col-lg-10 p-0">

				<!-- TOPBAR -->
				<div
					class="topbar d-flex justify-content-between align-items-center">

					<div class="top-bar" id="hide-section-parent">
						<div class="logo">⚖️ LawSetu</div>

						<div class="theme-toggle" id="hide-section"
							onclick="toggleTheme()">
							<div class="toggle-circle" id="toggleIcon">☀</div>
						</div>
					</div>
					<button class="btn btn-dark d-md-none" style="margin-right:1rem;" onclick="toggleSidebar()">☰</button>

				</div>

				<!-- CONTENT -->
				<div class="container mt-3"
					style="display: flex; justify-content: center;">
					<div class="profile-container">



						<div class="profile-header">

							<div class="profile-img" id="client-profile-img"></div>

							<div class="profile-info">
								<h2 id="client-name2">...</h2>
								<p>Professional Client Profile</p>
							</div>

						</div>

						<div class="profile-grid">

							<div class="field">
								<div class="label">User Name</div>
								<div class="value " id="client-name3">.....</div>
							</div>

							<div class="field">
								<div class="label">Email</div>
								<div class="value" id="client-email">.....@gmail.com</div>
							</div>

							<div class="field">
								<div class="label">Mobile Number</div>
								<div class="value" id="client-phone">.....</div>
							</div>

							<div class="field">
								<div class="label">City</div>
								<div class="value" id="client-city">.....</div>
							</div>

							<div class="field">
								<div class="label">Role</div>
								<div class="value" id="client-role">.....</div>
							</div>

							<div class="field">
								<div class="label">Client User ID</div>
								<div class="value" id="client-id">.....</div>
							</div>

						</div>

						<div class="buttons">
							<button class="btn profile-btn update-btn"
								onclick="window.location.href='/lawsetu/user-update-profile'">
								Update Profile</button>

							<button class="btn profile-btn password-btn">Update
								Password</button>

							<button class="btn profile-btn home-btn"
								onclick="window.location.href='/lawsetu/client-dashboard'">
								Back</button>
						</div>

					</div>
				</div>

			</div>
		</div>
	</div>

	<div class="overlay" id="overlay"></div>
	<div class="floating">
		<button class="assistant">💡</button>
		<button class="query" data-bs-toggle="modal"
			data-bs-target="#queryModal">❓</button>
	</div>
	<!--model-->


	<div class="modal fade" id="queryModal">
		<div
			class="modal-dialog modal-dialog-scrollable modal-dialog-centered">
			<div class="modal-content">

				<div class="modal-header">
					<h5 class="modal-title">Submit Legal Query</h5>
					<button class="btn-close" data-bs-dismiss="modal"></button>
				</div>

				<div class="modal-body">
					<form>

						<div class="mb-3">
							<label class="form-label">Name *</label> <input type="text"
								class="form-control" required>
						</div>

						<div class="mb-3">
							<label class="form-label">Email *</label> <input type="email"
								class="form-control" required>
						</div>

						<div class="mb-3">
							<label class="form-label">Message *</label>
							<textarea class="form-control" rows="4" required></textarea>
						</div>

					</form>
				</div>

				<div class="modal-footer">
					<button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
					<button class="btn btn-warning">Submit</button>
				</div>

			</div>
		</div>
	</div>


	<script>

        /* ================= THEME ================= */


        /* ================= SIDEBAR ================= */
        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("active");
            document.getElementById("overlay").classList.toggle("active");
        }

        document.getElementById("overlay").onclick = () => {
            toggleSidebar();
        };

        /* ================= MENU ================= */
        function toggleMenu() {
            document.getElementById("menu").classList.toggle("d-none");
        }

        /* ================= DATA ================= */
        const lawData = {

            civil: `
<h4>Civil Law Sections</h4>
<ul>
<li>IPC 9 - Good Faith</li>
<li>IPC 52 - Good Faith Definition</li>
<li>Contract Act Section 10</li>
<li>Tort Law Basics</li>
</ul>
`,

            criminal: `
<h4>Criminal Law Sections</h4>
<ul>
<li>IPC 302 - Murder</li>
<li>IPC 376 - Rape</li>
<li>IPC 420 - Fraud</li>
<li>IPC 506 - Criminal Intimidation</li>
</ul>
`,

            family: `
<h4>Family Law</h4>
<ul>
<li>Hindu Marriage Act</li>
<li>Divorce Laws</li>
<li>Child Custody</li>
<li>Maintenance Section 125</li>
</ul>
`,

            property: `
<h4>Property Law</h4>
<ul>
<li>Transfer of Property Act</li>
<li>Land Dispute Laws</li>
<li>RERA Act</li>
<li>Partition Suit</li>
</ul>
`

        };

        /* ================= SHOW DATA ================= */
        function showData(type) {

            document.getElementById("content").innerHTML = lawData[type];

            document.querySelectorAll(".topbar-menu button").forEach(btn => {
                btn.classList.remove("active");
            });

            event.target.classList.add("active");

        }

        window.toggleLawyerMenu = function () {
            const menu = document.getElementById("lawyerMenu");
            if (menu) {
                menu.classList.toggle("d-none");
            }
        }


        // 💡 AI Assistant
        document.querySelector(".assistant").addEventListener("click", function () {
            alert("AI Assistant Coming Soon 🤖");
        });


        // ========= theme
        window.onload = function () {

            const savedTheme = localStorage.getItem("theme") || "light";

            document.body.classList.add(savedTheme);
        }


        function toggleMode() {

            const body = document.body;

            body.classList.toggle("dark");
            body.classList.toggle("light");


            // SAVE THEME

            if (body.classList.contains("dark")) {

                localStorage.setItem("theme", "dark");

            } else {

                localStorage.setItem("theme", "light");
            }
        } window.onload = function () {

            const savedTheme = localStorage.getItem("theme") || "light";

            document.body.classList.add(savedTheme);
        }


        function toggleTheme() {

            const body = document.body;

            body.classList.toggle("dark");
            body.classList.toggle("light");


            // SAVE THEME

            if (body.classList.contains("dark")) {

                localStorage.setItem("theme", "dark");

            } else {

                localStorage.setItem("theme", "light");
            }
        }


        // session accessing
        
      async function accessSessionData(){
	
	    const response = await fetch(
	            "/lawsetu/session-data",
	            {
	                method: "GET",
	                credentials: "include"
	            }
	        );

	        const data = await response.json();
			
	        document.querySelector("#client-profile-img").innerText = data.userName.charAt(0);
	        document.querySelector("#client-name1").innerText = data.userName;
	        document.querySelector("#client-name2").innerText = data.userName;
	        document.querySelector("#client-name3").innerText = data.userName;
	        document.querySelector("#client-email").innerText = data.userEmail;
	        document.querySelector("#client-phone").innerText = data.userMobileNo;
	        document.querySelector("#client-city").innerText = data.userCity;
	        document.querySelector("#client-role").innerText = "Client";
	        document.querySelector("#client-id").innerText = data.userId;
	        
	 
     }
 
     accessSessionData();
        
    </script>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
