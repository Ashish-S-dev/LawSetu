<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description"
	content="Create your LawSetu account to connect with lawyers, manage cases and access legal services online.">
<meta name="keywords"
	content="LawSetu signup, register lawyer, client registration, legal platform, Lawसेतु">

<link rel="icon" type="image/x-icon" th:href="@{/img/lawSetuLogo.png}">
<title>Sign Up – LawSetu</title>

<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
	rel="stylesheet">

<style>
:root {
	--transition: 0.3s ease;
}

:root {
	--bg: #FAFAFA;
	--card: #ffffff;
	--primary: #111111;
	--accent: #D4AF37;
	--text: #1F2937;
	--shadow: rgba(0, 0, 0, .08);
}

body.dark {
	--bg: #0A0A0A;
	--card: #1A1A1A;
	--primary: #ffffff;
	--accent: #FFD700;
	--text: #ffffff;
	--shadow: rgba(255, 255, 255, .05);
}

body {
	margin: 0;
	font-family: 'Poppins', sans-serif;
	background: var(--bg);
	color: var(--text);
	transition: var(--transition);
}

.container {
	display: flex;
	justify-content: center;
	align-items: center;
	min-height: 100vh;
	padding: 20px;
}

.card {
	background: var(--card);
	padding: 30px;
	border-radius: 20px;
	width: 100%;
	max-width: 420px;
	box-shadow: 0 10px 30px var(--shadow);
}

.title {
	text-align: center;
	font-size: 28px;
	font-weight: 600;
}

.subtitle {
	text-align: center;
	font-size: 14px;
	margin-bottom: 25px;
	opacity: 0.7;
}

.form-group {
	margin-bottom: 15px;
	margin-right: 2rem;
}

.form-group label,
.form-group select,
.form-group input {
	color: var(--text);
	background-color: var(--card);
}

label {
	font-size: 13px;
	margin-bottom: 5px;
	display: block;
}

input, select {
	width: 100%;
	padding: 12px;
	border-radius: 10px;
	border: 1px solid #ccc;
	outline: none;
	font-size: 14px;
}

input:focus, select:focus {
	border-color: var(--accent);
}

.btn {
	width: 100%;
	padding: 12px;
	border: none;
	border-radius: 10px;
	background: var(--accent);
	color: black;
	font-weight: 500;
	cursor: pointer;
}

.brand {
	text-align: center;
	font-weight: 600;
	margin-bottom: 10px;
	color: var(--accent);
}

.toggle {
	position: fixed;
	bottom: 20px;
	right: 20px;
	background: var(--card);
	border-radius: 50px;
	padding: 10px 15px;
	cursor: pointer;
	box-shadow: 0 5px 15px var(--shadow);
}

.message {
	margin-top: 10px;
	text-align: center;
	font-size: 14px;
}

.success {
	color: green;
}

.error {
	color: red;
}

/* Sign Up Link */
.signup-link {
	text-align: center;
	margin-top: 20px;
	font-size: 15px;
	color: #666;
}

.signup-link a {
	color: #1a5276;
	font-weight: 600;
	text-decoration: none;
	transition: color 0.3s ease;
}

.signup-link a:hover {
	color: #154360;
	text-decoration: underline;
}
</style>
</head>

<body class="light">

	<div class="container">
		<div class="card">
			<div class="brand">⚖️ Lawसेतु</div>
			<div class="title">Create Account</div>
			<div class="subtitle">Join the legal network</div>

			<form id="signupForm">
				<div class="form-group">
					<label>User Name</label> <input type="text" id="name">
				</div>

				<div class="form-group">
					<label>Email</label> <input type="email" id="email">
				</div>

				<div class="form-group">
					<label>Mobile Number</label> <input type="tel" id="mobile">
				</div>

				<div class="form-group">
					<label>Password</label> <input type="password" id="password">
				</div>

				<div class="form-group">
					<label>City</label> <select id="city">
						<option value="">Select City</option>
						<option value="Amethi">Amethi</option>
						<option value="Sultanpur">Sultanpur</option>
						<option value="Pratapgarh">Pratapgarh</option>
						<option value="Raibareli">Raibareli</option>
						<option value="Jaunpur">Jaunpur</option>
						<option value="Lucknow">Lucknow</option>
					</select>
				</div>

				<div class="form-group">
					<label>Role</label> <select id="role">
						<option value="">Select Role</option>
						<option value="Lawyer">Lawyer</option>
						<option value="Client">Client</option>
					</select>
				</div>

				<div class="form-group" id="barCouncilGroup" style="display: none">
					<label> Bar Council Id </label> <input type="text"
						id="barCouncilId" placeholder="Enter the id">
				</div>

				<button class="btn" id="submit-signup" type="submit">Sign
					Up</button>
				<div class="signup-link">
					Already have an account? <a href="/lawsetu/user-login">Login</a>
				</div>
			</form>

			<div id="responseMessage" class="message"></div>
		</div>
	</div>

	<div class="toggle" onclick="toggleMode()">🌙</div>

	<script>


const submitSignUp = document.querySelector("#submit-signup");

function validateForm(data) {
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const mobileRegex = /^\d{10}$/;
    //console.log(data.userName);
    //console.log(data.userEmail);
    //console.log(data.userPassword);
    //console.log(data.userCity);
    //console.log(data.userRole);
    //console.log(data.userMobileNo);
	
    if (!data.userName.trim()) return "Name is required";
    if (!emailRegex.test(data.userEmail)) return "Invalid email format";
    if (!mobileRegex.test(data.userMobileNo)) return "Invalid mobile number";
    if (data.userPassword.length < 6) return "Password must be at least 6 characters";
    if (!data.userCity) return "Please select a city";
    if (!data.userRole) return "Please select a role";

    return null;
}

// FORM SUBMIT + API CALL

document.getElementById("signupForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    let data = null;
    let userRole = document.getElementById("role").value;
    let api = null;
    
    const messageBox = document.getElementById("responseMessage");
    
    
    
    // Check for Null Entries
    if(document.getElementById("name").value==='' 
    		|| document.getElementById("email").value ==='' 
    		|| document.getElementById("mobile").value ==='' 
    		|| document.getElementById("password").value ==='' 
    		|| document.getElementById("city").value ==='' 
    		|| userRole === '')
    {
    	messageBox.innerText = "All fields are required";
    	messageBox.className = "message error";
        return;
    }
    
    if(userRole === "Lawyer"){
    	
    	// pass bar council id in API
    	let barCouncilId = document.querySelector("#barCouncilId").value;
    	
    	//console.log("Council id "+barCouncilId.value);
    	
    	api = "/lawsetu/lawyer/register/"+barCouncilId;
    	data = {
    	        "userName": document.getElementById("name").value,
    	        "userEmail": document.getElementById("email").value,
    	        "userMobileNo": document.getElementById("mobile").value,
    	        "userPassword": document.getElementById("password").value,
    	        "userCity": document.getElementById("city").value,
    	        "userRole": 1,
    	        "isActive":false
    	    };
    }else if(userRole === "Client"){
    	api = "/lawsetu/client/register";
    	data = {
    	        "userName": document.getElementById("name").value,
    	        "userEmail": document.getElementById("email").value,
    	        "userMobileNo": document.getElementById("mobile").value,
    	        "userPassword": document.getElementById("password").value,
    	        "userCity": document.getElementById("city").value,
    	        "userRole": 2,
    	        "isActive":false
    	    };
    }
    

    

    
    
    //console.log(data);
    
    // VALIDATION
    const error = validateForm(data);
    if (error) {
        messageBox.innerText = error;
        messageBox.className = "message error";
        return;
    }
    

    try {
    	submitSignUp.innerText = "Please Wait..";
        const response = await fetch(api, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });
		
        const resp = await response.json();
        
        if (resp.message === "User registered successfully") {
        	messageBox.innerText = "Signup successful!";
            messageBox.className = "message success";

            setTimeout(() => {
                messageBox.innerText = "";
                window.location.href="/lawsetu/otp-page";
            }, 3000);
            

		} else if (resp.message === "Email already exist") {
			// Registration Failed
			messageBox.innerText = "Email already exist";
            messageBox.className = "message error";

            setTimeout(() => {
                messageBox.innerText = "";
                window.location
            }, 5000);


		} else {
			
			messageBox.innerText = "Registration Failed, please refresh your browser";
            messageBox.className = "message error";

            setTimeout(() => {
                messageBox.innerText = "";
            }, 5000);

		}
        
        
    } catch (error) {
    	console.log("Error message "+error);
        messageBox.innerText = "Server error. Please try again.";
        messageBox.className = "message error";
    }
    
    // Form fields Empty
    
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("mobile").value = "";
    document.getElementById("password").value = "";
    document.getElementById("city").value = "";
    document.getElementById("role").value = "";
    document.getElementById("barCouncilId").value = "";

    
    /* HIDE BAR COUNCIL FIELD AGAIN */

    barCouncilGroup.style.display = "none";
    submitSignUp.innerText = "Sign Up";
    
});


document.getElementById("role").addEventListener("change", function () {
    const role = this.value;
    const box = document.getElementById("barCouncilGroup");

    if (role === "Lawyer") {
        box.style.display = "block";
    } else {	
        box.style.display = "none";
        document.getElementById("barCouncilId").value = "";
    }
});


// Validation
window.onload = function () {

    const savedTheme = localStorage.getItem("theme") || "light";

    document.body.classList.add(savedTheme);
}


function toggleMode() {

    const body = document.body;

    body.classList.toggle("dark");
    body.classList.toggle("light");

    
    // SAVE THEME

    if(body.classList.contains("dark")) {

        localStorage.setItem("theme", "dark");

    } else {

        localStorage.setItem("theme", "light");
    }
}


</script>

</body>
</html>
