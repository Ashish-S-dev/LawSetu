<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="description"
	content="View complete legal case information, status updates and consultation details on LawSetu.">
<meta name="keywords"
	content="case details, legal case tracking, advocate updates, Lawसेतु">

<link rel="icon" type="image/x-icon" th:href="@{/img/lawSetuLogo.png}">
<title>Case Details – LawSetu</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>

/* ===== THEME ===== */
:root {
	--bg: #FAFAFA;
	--card: #ffffff;
	--accent: #D4AF37;
	--text: #1F2937;
}

body.dark {
	--bg: #0A0A0A;
	--card: #1A1A1A;
	--accent: #FFD700;
	--text: #ffffff;
}

body {
	background: var(--bg);
	color: var(--text);
	font-family: 'Segoe UI', sans-serif;
}

/* ===== SIDEBAR ===== */
.sidebar {
	min-height: 100vh;
	background: #17324D;
	color: white;
	
}

/* ===== TOPBAR ===== */
.topbar {
	background: var(--card);
	position: sticky;
	top: 0;
	z-index: 1000;
}

/* ===== CARD ===== */
.card3d {
	background: var(--card);
	border-radius: 15px;
	padding: 20px;
	text-align: center;
	box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
}

.card3d h2, h4 {
	color: var(--accent);
}

.data-input-tag{
	background-color:var(--card) !important;
	color:var(--text) !important;
}
.btn-dash{
	background-color:#fff;
}
.btn-active{
	background: var(--accent);
	color: black;
}

/* MOBILE */
@media ( max-width :768px) {
	.sidebar {
		position: fixed;
		left: -260px;
		width: 250px;
		height: 100%;
		z-index: 1050;
	}
	.sidebar.active {
		left: 0;
	}
}
</style>
</head>

<body class="light">

	<div class="container-fluid">
		<div class="row">

			<!-- SIDEBAR -->
			<div class="col-lg-2 col-md-3 sidebar p-3 text-center" id="sidebar">

				<img src="https://i.pravatar.cc/80" class="rounded-circle mb-2">
				<h6 id="client-name">.....</h6>

				<a href="client-dashboard" class="btn btn-warning w-100 mt-3 mb-3 btn-dash">Dashboard</a>
				
				<button class="btn btn-light w-100 mb-2" onclick="toggleMenu()">
					📚 Legal Services</button>
				<!-- 🔽 SCHOOL MENU -->
				<div id="menu" class="d-none">

					<button
						onclick="window.location.href='/lawsetu/client-casedetails'"
						class="btn btn-outline-light w-100 mb-2 btn-active">Legal Records</button>

					<button class="btn btn-outline-light w-100 mb-2"
						onclick="toggleLawyerMenu()">Lawyer Finder</button>

					<!-- SUBMENU -->
					<div id="lawyerMenu" class="d-none">

						<button onclick="window.location.href='/lawsetu/civil-lawyer'"
							class="btn btn-sm btn-outline-warning w-100 mb-2">Civil
							Case</button>

						<button onclick="window.location.href='/lawsetu/civil-lawyer'"
							class="btn btn-sm btn-outline-warning w-100 mb-2">
							Family Case</button>

						<button onclick="window.location.href='/lawsetu/civil-lawyer'"
							class="btn btn-sm btn-outline-warning w-100 mb-2">
							Criminal Case</button>

					</div>

				</div>

				<button class="btn btn-light w-100 mb-2" onclick="window.location.href='/lawsetu/client-dashboard'" >Submit Query ?</button>

				<button class="btn btn-light w-100 mb-2"
					onclick="window.location.href='/lawsetu/about-lawsetu'">About
					us</button>


				<button class="btn btn-light w-100 mb-2"
					onclick="window.location.href='/lawsetu'">Logout</button>

			</div>

			<!-- MAIN -->
			<div class="col-lg-10 col-md-9 p-0">

				<!-- TOPBAR -->
				<div
					class="topbar d-flex justify-content-between align-items-center p-3">

					<!-- <div>
						<button class="btn btn-secondary btn-sm me-2" onclick="goBack()">⬅
							Back</button>
						<button class="btn btn-dark d-md-none" onclick="toggleSidebar()">☰</button>
					</div> -->


					<h5 class="mb-0">Legal Records</h5>

					
					<div>
						<button class="btn btn-warning btn-sm" onclick="toggleTheme()">🌙</button>
						<button class="btn btn-dark d-md-none" style="margin-left:1rem;" onclick="toggleSidebar()">☰</button>
					</div>

				</div>

				<!-- CONTENT -->
				<div class="container mt-4">

					<div class="row g-3">

						<div class="col-md-3">
							<div class="card3d">
								<h6>Total Cases</h6>
								<h2 id="totalCases">0</h2>
							</div>
						</div>

						<div class="col-md-3">
							<div class="card3d">
								<h6>Today's Cases</h6>
								<h2 id="todayCases">0</h2>
							</div>
						</div>

						<div class="col-md-3">
							<div class="card3d">
								<h6>Total Leads</h6>
								<h2 id="totalLeads">0</h2>
							</div>
						</div>

						<div class="col-md-3">
							<div class="card3d">
								<h6>Total Storage</h6>
								<h4 id="storage">0 GB</h4>
							</div>
						</div>

					</div>

					<!-- STATUS -->
					<div class="row mt-4">

						<div class="col-md-8" style="margin-bottom:1rem;">
							<div class="card3d">
								<h5>Case Status</h5>
								<p>
									Pending: <span id="pending">0</span>
								</p>
								<p>
									Disposed: <span id="disposed">0</span>
								</p>
								<p>
									Unavailable: <span id="unavailable">0</span>
								</p>
							</div>
						</div>

						<div class="col-md-4">
							<div class="card3d mb-3">
								<h6>Total Invoice</h6>
								<h4 id="invoice">₹ 0</h4>
							</div>

							<div class="card3d mb-3">
								<h6>Total Received</h6>
								<h4 id="received">₹ 0</h4>
							</div>

							<div class="card3d">
								<h6>Outstanding</h6>
								<h4 id="outstanding">₹ 0</h4>
							</div>
						</div>

					</div>

					<!-- FILTER -->
					<div class="card3d mt-4">
						<div class="row g-3">

							<div class="col-md-3">
								<input type="date" id="fromDate" class="form-control data-input-tag">
							</div>

							<div class="col-md-3">
								<input type="date" id="toDate" class="form-control data-input-tag">
							</div>

							<div class="col-md-3">
								<button class="btn btn-success w-100" onclick="filterData()">Filter</button>
							</div>

						</div>
					</div>

				</div>

			</div>
		</div>
	</div>

	<script>

/* ===== BACK BUTTON ===== */
function goBack(){
    if(document.referrer !== ""){
        window.history.back();
    } else {
        window.location.href = "p.html";
    }
}




/* ===== SIDEBAR ===== */
function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active");
}

/* ===== DUMMY DATA ===== */
let cases = [
{date:"2026-05-01", status:"pending", amount:1000},
{date:"2026-05-02", status:"disposed", amount:2000},
{date:"2026-05-03", status:"pending", amount:1500},
{date:"2026-05-04", status:"unavailable", amount:500},
];

/* ===== LOAD ===== */
function loadDashboard(data){

document.getElementById("totalCases").innerText = data.length;

let today = new Date().toISOString().split("T")[0];

document.getElementById("todayCases").innerText =
data.filter(c => c.date === today).length;

document.getElementById("totalLeads").innerText = data.length * 2;
document.getElementById("storage").innerText = data.length + " GB";

document.getElementById("pending").innerText =
data.filter(c=>c.status==="pending").length;

document.getElementById("disposed").innerText =
data.filter(c=>c.status==="disposed").length;

document.getElementById("unavailable").innerText =
data.filter(c=>c.status==="unavailable").length;

let total = data.reduce((sum,c)=>sum+c.amount,0);

document.getElementById("invoice").innerText = "₹ "+total;
document.getElementById("received").innerText = "₹ "+(total*0.6);
document.getElementById("outstanding").innerText = "₹ "+(total*0.4);

}

/* ===== FILTER ===== */
function filterData(){

let from = document.getElementById("fromDate").value;
let to = document.getElementById("toDate").value;

let filtered = cases.filter(c=>{
return (!from || c.date >= from) && (!to || c.date <= to);
});

loadDashboard(filtered);
}

/* INIT */
loadDashboard(cases);


/* ===== THEME ===== */

window.onload = function () {

    const savedTheme = localStorage.getItem("theme") || "light";

    document.body.classList.add(savedTheme);
}


function toggleTheme() {

    const body = document.body;

    body.classList.toggle("dark");
    body.classList.toggle("light");

    
    // SAVE THEME

    if(body.classList.contains("dark")) {

        localStorage.setItem("theme", "dark");

    } else {

        localStorage.setItem("theme", "light");
    }
}

/* ================= MENU ================= */
function toggleMenu(){
document.getElementById("menu").classList.toggle("d-none");
}

window.toggleLawyerMenu = function(){
    const menu = document.getElementById("lawyerMenu");
    if(menu){
        menu.classList.toggle("d-none");
    }
}

// Session data access
async function accessSessionData(){
	
	    const response = await fetch(
	            "/lawsetu/session-data",
	            {
	                method: "GET",
	                credentials: "include"
	            }
	        );

	        const data = await response.json();

	        document.getElementById("client-name").innerText = data.userName;
	 
}

accessSessionData();


</script>

</body>
</html>
