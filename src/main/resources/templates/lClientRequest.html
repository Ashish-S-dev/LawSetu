<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="description"
	content="Review and manage incoming client consultation requests efficiently through LawSetu.">
<meta name="keywords"
	content="client requests, lawyer consultation requests, advocate leads, Lawसेतु">

<link rel="icon" type="image/x-icon" th:href="@{/img/lawSetuLogo.png}">
<title>Client Requests – LawSetu</title>

<link rel="icon" href="./Images/logo.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* THEME */
body.light {
	--bg: #FAFAFA;
	--card: #ffffff;
	--accent: #D4AF37;
	--text: #1F2937;
	--shadow: rgba(0, 0, 0, 0.08);
}

body.dark {
	--bg: #0A0A0A;
	--card: #1A1A1A;
	--accent: #FFD700;
	--text: #ffffff;
	--shadow: rgba(255, 255, 255, 0.06);
}

body {
	background: var(--bg);
	color: var(--text);
	font-family: 'Segoe UI';
}

/* SIDEBAR */
.sidebar {
	
	background: linear-gradient(180deg, #17324D, #0F2235);
	color: white;
	z-index:1000;
}

/* TOPBAR */
.topbar {
	background: var(--card);
	box-shadow: 0 5px 20px var(--shadow);
}

/* Topbar Selesct */
.topbar-select {
	display: none;
	text-align: center;
	flex: 2;
	margin-inline: .2rem;
}

.topbar-select select {
	background-color: var(--bg);
	color: var(--text);
	border: 1px solid var(--accent);
}

/* MENU */
.menu-btn {
	background: transparent;
	color: #fff;
	border: 1px solid rgba(255, 255, 255, 0.3);
}

.menu-btn.active {
	background: var(--accent);
	color: #000;
}

/* CARD */
.card3d {
	background: var(--card);
	border-radius: 15px;
	box-shadow: 0 20px 40px var(--shadow);
}

/* TABS */
.tabs {
	display: flex;
	gap: 25px;
}

.tab {
	cursor: pointer;
	position: relative;
}

.tab.active {
	color: var(--accent);
}

.tab.active::after {
	content: "";
	height: 3px;
	width: 100%;
	background: var(--accent);
	position: absolute;
	bottom: -5px;
	left: 0;
}

/* SECTION */
.section {
	display: none;
}

.active-section {
	display: block;
}

/* MOBILE */
@media ( max-width :768px) {
	.sidebar {
		position: fixed;
		left: -250px;
		width: 250px;
		height: 100%;
		transition: 0.3s;
	}
	.sidebar.active {
		left: 0;
	}
}

@media ( max-width :600px) {
	.tabs {
		display: none;
	}
	.topbar-select {
		display: block;
		min-width:5rem;
	}
}
@media ( max-width :285px) {
	.theme-btn{
	display:none;
	}
}

/* OVERLAY */
.overlay {
	position: fixed;
	width: 100%;
	height: 100%;
	background: rgba(0, 0, 0, 0.4);
	display: none;
}

.overlay.active {
	display: block;
}

/*Table Color Update*/
.tbl-data {
	--bs-table-bg: var(--card);
	--bs-table-color: var(--text);
	--bs-table-border-color: rgba(255, 255, 255, 0.08);
}

.tbl-data th {
	background: var(--accent) !important;
	color: #000 !important;
}

.tbl-data td {
	background: var(--card) !important;
	color: var(--text) !important;
}

.btn-light {
	background: transparent;
	color: #fff;
	border: 1px solid rgba(255, 255, 255, 0.3);
}

</style>
</head>

<body class="light">

	<div class="container-fluid">
		<div class="row">

			<!-- SIDEBAR -->
			<div class="col-lg-2 sidebar p-3" id="sidebar">
				<h4 class="text-center">⚖ Law सेतु</h4>
				<p class="text-center small">Welcome, Lawyer</p>
				<div class="d-flex flex-column gap-3 mt-4">
					<button onclick="location.href='lawyer-dashboard'" class="btn menu-btn w-100">Dashboard</button>
					<button class="btn menu-btn" onclick="location.href='lawyer-case-study'">Cases</button>
					<button class="btn menu-btn active" onclick="location.href='lawyer-client-request'">Clients</button>
					<button class="btn menu-btn" onclick="location.href='lawyer-earning'">Earnings</button>
					<button onclick="location.href='lawyer-profile'"
						class="btn menu-btn">View Profile</button>
					<button onclick="location.href='about-lawsetu'"
						class="btn menu-btn">About Us</button>
					<button onclick="location.href='/lawsetu'" class="btn menu-btn">Logout</button>
				</div>
			</div>

			<!-- MAIN -->
			<div class="col-lg-10 p-0">

				<!-- TOPBAR -->
				<div
					class="topbar p-3 d-flex justify-content-between align-items-center">

					<div class="d-flex align-items-center gap-3">

						<div class="tabs">
							<span class="tab active" onclick="showSection('current', this)">Current
								Clients</span> <span class="tab" onclick="showSection('new', this)">New
								Clients</span> <span class="tab" onclick="showSection('old', this)">Old
								Clients</span>
						</div>
						
						<div class="topbar-select">
						<select class="form-control" onchange="showDataFirst(this.value)">
							<option value="home">Filter Clients</option>
							<option value="current">Current Clients</option>
							<option value="new">Current New</option>
							<option value="old">Current Old</option>
						</select>
					</div>

					</div>

					<div>
						<button class="btn btn-warning btn-sm me-2 theme-btn" onclick="toggleTheme()">Mode</button>
						<button class="btn btn-dark d-md-none me-1" onclick="toggleSidebar()">☰</button>
					</div>
				</div>

				<!-- CONTENT -->
				<div class="container mt-4">

					<!-- CURRENT -->
					<div id="current" class="section active-section">
						<div class="card3d p-4">
							<h5>Current Clients</h5>
							<table class="table tbl-data mt-3" id="currentTable"></table>
						</div>
					</div>

					<!-- NEW -->
					<div id="new" class="section">
						<div class="card3d p-4">
							<h5>New Clients</h5>
							<table class="table tbl-data mt-3" id="newTable"></table>
						</div>
					</div>

					<!-- OLD -->
					<div id="old" class="section">
						<div class="card3d p-4">
							<h5>Old Clients</h5>
							<table class="table tbl-data mt-3">
								<tr>
									<th>Name</th>
									<th>Status</th>
								</tr>
								<tr>
									<td>Old1</td>
									<td>Closed</td>
								</tr>
								<tr>
									<td>Old2</td>
									<td>Closed</td>
								</tr>
							</table>
						</div>
					</div>

				</div>
				<!-- RESET BUTTON 
<button class="btn btn-secondary" onclick="resetClients()">Reset Clients</button>-->
			</div>
		</div>
	</div>

	<div class="overlay" id="overlay"></div>

	<script>
    function resetClients(){
    newClients = [
    "Rahul","Amit","Sneha","Ravi","Priya",
    "Anjali","Karan","Neha","Vikas","Pooja"
    ];
    save();
    renderNew();
}
document.getElementById("overlay").onclick = function(){
    document.getElementById("sidebar").classList.remove("active");
    this.classList.remove("active");
};

// ================= DATA =================
let newClients = JSON.parse(localStorage.getItem("newClients")) || [
"Rahul","Amit","Sneha","Ravi","Priya",
"Anjali","Karan","Neha","Vikas","Pooja"
];

let currentClients = JSON.parse(localStorage.getItem("currentClients")) || [];

// ================= SAVE =================
function save(){
localStorage.setItem("newClients", JSON.stringify(newClients));
localStorage.setItem("currentClients", JSON.stringify(currentClients));
}

// ================= RENDER NEW =================
function renderNew(){
let html = "<tr><th>Name</th><th>Action</th></tr>";

newClients.forEach((name,i)=>{
html += `
<tr>
<td>${name}</td>
<td>
<button class="btn btn-success btn-sm" onclick="accept(${i})">Accept</button>
<button class="btn btn-danger btn-sm" onclick="removeClient(${i})">Delete</button>
</td>
</tr>`;
});

document.getElementById("newTable").innerHTML = html;
}

// ================= RENDER CURRENT =================
function renderCurrent(){
let html = "<tr><th>Name</th><th>Status</th></tr>";

currentClients.forEach(name=>{
html += `<tr><td>${name}</td><td>Active</td></tr>`;
});

document.getElementById("currentTable").innerHTML = html;
}

// ================= ACCEPT =================
function accept(i){
currentClients.push(newClients[i]);
newClients.splice(i,1);

save();
renderNew();
renderCurrent();
}

// ================= DELETE =================
function removeClient(i){
newClients.splice(i,1);

save();
renderNew();
}

// ================= INIT =================
renderNew();
renderCurrent();


// UI FUNCTIONS
function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active");
//document.getElementById("overlay").classList.toggle("active");
}



function showSection(id, el){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active-section"));
document.getElementById(id).classList.add("active-section");

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
}

document.querySelectorAll(".menu-btn").forEach(btn=>{
    btn.addEventListener("click", function(){
        document.querySelectorAll(".menu-btn").forEach(b=>b.classList.remove("active"));
        this.classList.add("active");
    });
});
// ========goToFunction========
function goToPage(page){
    window.location.href = page;

}


//THEME TOGGLE
window.onload = function () {

    const savedTheme = localStorage.getItem("theme") || "light";

    document.body.classList.add(savedTheme);
}


function toggleTheme() {

    const body = document.body;

    body.classList.toggle("dark");
    body.classList.toggle("light");

    
    // SAVE THEME

    if(body.classList.contains("dark")) {

        localStorage.setItem("theme", "dark");

    } else {

        localStorage.setItem("theme", "light");
    }
}

function showDataFirst(value){
	if(value==="current"){
		showSection('current', this);
	}else if(value==="old"){
		showSection('old', this);
	}else if(value==="new"){
		showSection('new', this);
	}else{
		window.location.reload();
	}
}



</script>

</body>
</html>
