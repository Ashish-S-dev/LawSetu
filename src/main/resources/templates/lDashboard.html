<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">


<meta name="description"
	content="Access client requests, manage cases, earnings and legal consultations through the LawSetu lawyer dashboard.">
<meta name="keywords"
	content="lawyer dashboard, advocate portal, legal case management, LawSetu lawyer, Lawसेतु">

<link rel="icon" type="image/x-icon" th:href="@{/img/lawSetuLogo.png}">
<title>Lawyer Dashboard – LawSetu</title>


<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<!-- CSS -->

<style>
/* THEME */
:root {
	--bg: #FAFAFA;
	--card: #ffffff;
	--accent: #D4AF37;
	--text: #1F2937;
	--shadow: rgba(0, 0, 0, 0.08);
}

body.dark {
	--bg: #0A0A0A;
	--card: #1A1A1A;
	--accent: #FFD700;
	--text: #ffffff;
	--shadow: rgba(255, 255, 255, 0.06);
}

body {
	background: var(--bg);
	color: var(--text);
	font-family: 'Segoe UI', sans-serif;
}

/* SIDEBAR */
.sidebar {
	min-height: 100vh;
	background: linear-gradient(180deg, #17324D, #0F2235);
	color: white;
	box-shadow: 5px 0 20px rgba(0, 0, 0, 0.3);
}

/* TOPBAR */
.topbar {
	background: var(--card);
	box-shadow: 0 5px 20px var(--shadow);
}

/* BUTTON */
.btn-warning {
	background: var(--accent);
	border: none;
	color: #000;
}

/* MENU */
.menu-btn {
	background: transparent;
	color: #fff;
	border: 1px solid rgba(255, 255, 255, 0.3);
	text-align: left;
}

.menu-btn.active {
	background: var(--accent);
	color: #000;
}

/* CARD */
.card3d {
	background: var(--card);
	border-radius: 15px;
	box-shadow: 0 20px 40px var(--shadow);
	text-align: center;
	transition: 0.3s;
}

.card3d:hover {
	transform: translateY(-5px);
}

.btn {
	text-align: center;
}

/* STATUS */
.status-active {
	color: green;
}

.status-pending {
	color: orange;
}

.status-closed {
	color: red;
}

/* MOBILE */
@media ( max-width :768px) {
	.sidebar {
		position: fixed;
		left: -250px;
		width: 250px;
		height: 100%;
		z-index: 1050;
		transition: 0.3s;
	}
	.sidebar.active {
		left: 0;
	}
}

@media ( max-width :280px) {
	
	.card3d{
		overflow:auto;
	}
	.theme-btn{
		display:none;
	}
	
}
/* OVERLAY */
.overlay {
	position: fixed;
	width: 100%;
	height: 100%;
	background: rgba(0, 0, 0, 0.4);
	display: none;
}

.overlay .active {
	display: block;
}

/*Table Color Update*/
.tbl-data {
	--bs-table-bg: var(--card);
	--bs-table-color: var(--text);
	--bs-table-border-color: rgba(255, 255, 255, 0.08);
}

.tbl-data th {
	background: var(--accent) !important;
	color: var(--text) !important;
}

.tbl-data td {
	background: var(--card) !important;
	color: var(--text) !important;
}
</style />
</head>
<body class="light ">
	<div class="container-fluid ">
		<div class="row ">
			<!--SIDEBAR -->
			<div class="col-lg-2 col-md-3 sidebar p-3" id="sidebar">
				<h4 style="text-align: center;">⚖ Law सेतु</h4>
				<p class="text-center small ">Welcome, Lawyer</p>
				<div class="d-flex flex-column gap-3 mt-4
	">
					<button onclick="location.href ='lawyer-dashboard '"
						class="btn menu-btn active
	">Dashboard</button>
					<button onclick="location.href ='lawyer-case-study'"
						class="btn menu-btn ">Cases</button>
					<button onclick="location.href
	='lawyer-client-request '"
						class="btn menu-btn ">Clients</button>
					<button onclick="location.href ='lawyer-earning '"
						class="btn menu-btn ">Earnings</button>
					<button onclick="location.href ='lawyer-profile '"
						class="btn menu-btn
	">View Profile</button>

					<button onclick="location.href ='about-lawsetu'"
						class="btn menu-btn
	">About Us</button>

					<button onclick="location.href ='/lawsetu '" class="btn menu-btn ">Logout
					</button>
				</div>
			</div>
			<!--MAIN -->
			<div class="col-lg-10 col-md-9 p-0 ">
				<!--TOPBAR -->
				<div
					class="topbar d-flex justify-content-between align-items-center p-3 ">
					<h5 class="mb-0 ">Dashboard</h5>
					<div>
						<button class="btn btn-warning btn-sm theme-btn" onclick="toggleTheme() ">🌙Mode</button>
						
						<button class="btn btn-dark d-md-none " style="margin-left: 1rem;" onclick="toggleSidebar() ">☰</button>
					</div>
				</div>
				<!--CONTENT -->
				<div class="container mt-4 ">
					<div class="row g-4 ">
						<!--CARD 1 -->
						<div class="col-md-3 ">
							<div class="card3d p-3 ">
								<h6>Total Cases</h6>
								<h2>24</h2>
							</div>
						</div>
						<!--CARD 2 -->
						<div class="col-md-3 ">
							<div class="card3d p-3 ">
								<h6>Active Cases</h6>
								<h2>10</h2>
							</div>
						</div>
						<!--CARD 3 -->
						<div class="col-md-3 ">
							<div class="card3d p-3 ">
								<h6>Clients</h6>
								<h2>18</h2>
							</div>
						</div>
						<!--CARD 4 -->
						<div class="col-md-3 ">
							<div class="card3d p-3 ">
								<h6>Earnings</h6>
								<h2>₹45K</h2>
							</div>
						</div>
					</div>
					<!--TABLE -->
					<div class="card3d p-4 mt-4 ">
						<h5>Recent Cases</h5>
						<table class="table mt-3 tbl-data
	">
							<thead>
								<tr style="background-color: red;">
									<th>Client</th>
									<th>Case Type</th>
									<th>Status</th>
								</tr>
							</thead>
							<tbody>
								<tr>
									<td>Rahul</td>
									<td>Criminal</td>
									<td class="status-active ">Active</td>
								</tr>
								<tr>
									<td>Amit</td>
									<td>Civil</td>
									<td class="status-pending ">Pending</td>
								</tr>
								<tr>
									<td>Sneha</td>
									<td>Family</td>
									<td class="status-closed ">Closed</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</div>
	<div class="overlay" id="overlay" onclick="toggleSidebar() ">
	</div>
	<script> 
	 
	//SIDEBAR TOGGLE
function toggleSidebar() {
		document.getElementById("sidebar").classList.toggle("active");
		document.getElementById("overlay").classList.toggle("active");
	
}

   //ACTIVE MENU SWITCH
const menuBtns = document.querySelectorAll( ".menu-btn ") ;

menuBtns.forEach(btn => { btn.addEventListener( "click ", function() {
	
	menuBtns.forEach(b => b.classList.remove("active"));
	this.classList.add("active");
	
});
});
//THEME TOGGLE
window.onload = function () {const savedTheme =
	localStorage.getItem("theme") || "light";document
	.body.classList.add(savedTheme);
	
}

function toggleTheme() {const body = document.body;body
	.classList.toggle("dark");body .classList.toggle("light"); 
	
	// SAVE THEME 
	if(body.classList.contains("dark")) {
	localStorage.setItem("theme", "dark");
	
}

else {localStorage .setItem("theme", "light");
	
}
}
</script>
</body>
</html>
